name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'listings.json'
      - 'content.json'
      - '.cms-build-trigger'
      - 'build_catalog.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build static pages
        run: python3 build_catalog.py

      - name: Commit built files
        run: |
          git config user.name  "MiaLux CMS Bot"
          git config user.email "cms@mialuxrealty.com"
          git add miami-pre-construction-condos.html
          git diff --staged --quiet || git commit -m "Auto-build: regenerate static pages [skip ci]"
          git push